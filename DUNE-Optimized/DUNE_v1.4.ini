[Player]
# -------------------------------------------------------------
# DUNE v1.4 - 4K Cabinet Performance Initialization Settings
# -------------------------------------------------------------

# EXCLUSIVE FULLSCREEN: Critical for 4K cabinet smoothness (prevents Windows Desktop Window Manager stutter)
ExclusiveMode=1

# ANTI-ALIASING: 
# Disable SSAA (Super-Sampling) because it renders the table at 8K and downscales to 4K, which crushes FPS.
# Keep FXAA/SMAA on for fast edge smoothing.
SSAA=0
FXAA=1
SMAA=1

# FRAMERATE & VSYNC
# 0 = No FPS limit. Let the cabinet run as fast as possible.
# SyncDisplay = 1 (VSync On) to avoid screen tearing on a 4K 60Hz/120Hz display
FPSLimit=0
SyncDisplay=1

# TEXTURE QUALITY
# Allow up to 4K textures for maximum sharpness on the playfield
MaxTexDimension=4096
AnisotropicFiltering=4

# -------------------------------------------------------------
# B2S Backglass Settings
# -------------------------------------------------------------
[B2S]
# Set B2S to run in 'EXE' mode instead of standard mode to offload backglass processing to another CPU thread
# This frees up the main VPX thread for VBScript and Physics on the Ryzen CPU
B2SWindows=1

# -------------------------------------------------------------
# Audio Settings
# -------------------------------------------------------------
[Audio]
MusicVolume=50
SoundFXVolume=50
